<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IsleWave 音乐</title>
  <link rel="stylesheet" href="TheHeader.css">
</head>
<body class="page-transition">
  <nav class="top-nav">
    <div class="nav-container">
    <div class="top-left">
      <h1 class="logo">IsleWave 音乐</h1>
      <ul class="nav-links">
        <li class="top-one"><a href="#">音乐馆</a></li>
        <li class="my-music"><a href="#">我的音乐</a></li>
        <li class="the-app"><a href="#">客户端</a></li>
        <li class="the-shpping"><a href="#">商城</a></li>
        <li><a href="#" class="VIP">VIP</a></li>
      </ul>
    </div>
    <div class="top-right">
      <div class="search-box">
        <input type="search" placeholder="搜索音乐、MV、歌单、用户">
        <button class="search-button">Q</button>
      </div>
      <a href="#" id="loginBtn" class="login">登录</a>
      <span class="open-vip">开通VIP</span>
      <button class="recharge">充值</button>
    </div>
    </div>
  </nav>
  <nav class="sub-nav">
    <div class="nav-container">
      <ul class="sub-nav-links">
        <li><a href="#" class="firstPage">首页</a></li>
        <li><a href="#" class="theSinger">歌手</a> </li>
        <li><a href="#" class="">排行榜</a></li>
        <li><a href="#" class="">分类歌单</a></li>
        <li><a href="#" class="">MV</a></li>
        <li><a href="#" class="">专辑</a></li>
      </ul>
    </div>
  </nav>

  <script>
    document.getElementById("loginBtn").addEventListener("click",(event) =>{
      event.preventDefault();

      document.body.classList.add("page-hidden");
      setTimeout(() => {
        window.location.href = "TheLogin.html";
      },300);
    });

    window.addEventListener("load",() =>{
      if(localStorage.getItem("musicLoggedIn")){
        document.getElementById("loginBtn").textContent = "已登录";
        document.getElementById("loginBtn").removeAttribute("href");
      }
    });
  </script>
</body>
</html>
